<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Tương Tác AI - Thầy Nguyễn Đức Duy</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { overflow: hidden; background: linear-gradient(to bottom, #87CEEB 53%, #6B9E34 53%); height: 100vh; width: 100vw; position: relative;}
        
        .sun { position: absolute; top: 40px; left: 40px; width: 120px; height: 120px; background-color: #FFD700; border-radius: 50%; box-shadow: 0 0 40px #FF8C00; cursor: pointer; transition: 0.2s; z-index: 100;}
        .sun:hover { transform: scale(1.1); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; position: relative; z-index: 100; }
        
        .controls { display: flex; gap: 15px; align-items: center;}
        .btn-icon { background: white; border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s; display: flex; justify-content: center; align-items: center; }
        .btn-icon:hover { transform: scale(1.1); background: #f0f0f0; }
        
        .btn-feature { background: #FF6347; color: white; border: none; padding: 12px 25px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; display: flex; align-items: center; gap: 8px;}
        .btn-feature:hover { transform: scale(1.05); background: #FF4500; }

        .status-badge { background-color: #4682B4; color: #FFD700; padding: 12px 35px; border-radius: 30px; font-size: 22px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.3s; }
        
        #game-area { position: absolute; top: 100px; left: 0; width: 100vw; height: calc(100vh - 100px); overflow: hidden; }
        .student-node { position: absolute; display: flex; flex-direction: column; align-items: center; width: 100px; transition: transform 0.1s linear, box-shadow 0.3s, opacity 0.5s; z-index: 10; cursor: pointer; }
        .student-node img { width: 75px; height: 75px; background-color: rgba(255,255,255,0.9); border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 4px 8px rgba(0,0,0,0.3); pointer-events: none; }
        .student-node .name { background: rgba(0,0,0,0.7); color: white; padding: 4px 10px; border-radius: 12px; font-size: 14px; font-weight: bold; margin-top: 5px; text-align: center; white-space: nowrap; pointer-events: none; }
        
        .student-node.selected { z-index: 999 !important; }
        .student-node.selected img { border-color: #FFD700; background-color: #fff; box-shadow: 0 0 40px #FFD700; transform: scale(1.2); }
        .student-node.selected .name { background: #FFD700; color: #000; font-size: 18px; transform: scale(1.2); margin-top: 15px;}

        .camera-container { position: absolute; bottom: 40px; right: 20px; width: 260px; height: 195px; background: black; border: 4px solid white; border-radius: 12px; overflow: hidden; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        #webcam, #output_canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .ai-status { position: absolute; bottom: 5px; right: 10px; color: #00FF00; font-size: 14px; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 1001;}

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 750px; max-width: 95%; max-height: 95vh; overflow-y: auto; position: relative;}
        
        #question-display { font-size: 22px; font-weight: bold; color: #1E90FF; margin-bottom: 25px; text-align: center; line-height: 1.5;}
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { background: #fff; border: 2px solid #ced4da; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .option-btn.correct { background: #d4edda; border-color: #28a745; color: #155724;}
        .option-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; }
        .form-group textarea { width: 100%; height: 160px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        
        .btn-save { background: #4CAF50; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; float: right; margin-left: 10px;}
        .btn-close { background: #6c757d; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; float: right; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; }

        .footer-credit { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: white; font-size: 15px; font-style: italic; z-index: 100; text-shadow: 1px 1px 3px black; pointer-events: none;}
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto"><source src="nhacnen.mp3" type="audio/mpeg"></audio>
    <audio id="correctSound" preload="auto"></audio>
    <audio id="wrongSound" preload="auto"></audio>

    <div class="sun" onclick="triggerSelection(1)" title="Chọn ngẫu nhiên 1 em"></div>
    
    <div class="header">
        <div class="controls">
            <button class="btn-icon" onclick="openSettings()">⚙️</button>
            <button class="btn-icon" id="musicBtn" onclick="toggleMusic()">🔇</button>
            <button class="btn-feature" style="background: #20b2aa;" onclick="showRandomQuestion()">📝 Ôn Tập Trắc Nghiệm</button>
        </div>
        <div class="status-badge" id="statusText">Giơ ngón tay vào Camera để chọn học sinh!</div>
        <div style="flex: 1;"></div>
    </div>

    <div id="game-area"></div>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="ai-status" id="ai-status">Đang tải AI...</div>
    </div>

    <div class="footer-credit"><i>Thiết kế bởi thầy Nguyễn Đức Duy - Trường TH Nguyễn Bỉnh Khiêm</i></div>

    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <span class="close-x" onclick="closeModal('settingsModal')">✖</span>
            <h2>Cài đặt Trò chơi</h2>
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <div style="flex: 1;">
                    <div class="form-group">
                        <label>📋 Danh sách Học sinh (Tên | Ảnh):</label>
                        <textarea id="studentsDataText" placeholder="Nguyễn Văn A|anh1.png"></textarea>
                    </div>
                </div>
                <div style="flex: 1;">
                    <div class="form-group">
                        <label>📚 Câu hỏi Trắc nghiệm:</label>
                        <textarea id="questionsDataText"></textarea>
                    </div>
                </div>
            </div>
            <div style="margin-top: 10px; overflow: hidden;">
                <button class="btn-save" onclick="saveSettings()">💾 Lưu & Làm mới Game</button>
                <button class="btn-close" onclick="closeModal('settingsModal')">Hủy</button>
            </div>
        </div>
    </div>

    <div class="modal" id="questionModal">
        <div class="modal-content" style="width: 800px; padding: 40px;">
            <span class="close-x" onclick="closeModal('questionModal')">✖</span>
            <h2 style="color: #4682B4; margin-bottom: 20px;">Phần Thi Trắc Nghiệm</h2>
            <div id="question-display"></div>
            <div class="options-grid" id="options-container"></div>
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn-feature" style="display: inline-flex; background: #20b2aa;" onclick="showRandomQuestion()">Tiếp theo ⏭</button>
            </div>
        </div>
    </div>

    <script>
        let studentsMaster = []; // Danh sách gốc
        let studentNodes = [];   // Danh sách đang hiển thị (chưa bị loại)
        let isAnimating = true;
        let isSelecting = false;
        let questionBank = [];
        let currentCorrectAnswer = "";

        // --- KHỞI TẠO DỮ LIỆU ---
        function loadSettings() {
            const savedStd = localStorage.getItem('classDataNamesOnly');
            const rawStd = savedStd || "Tùng Chi\nBảo Ngọc\nBảo Trân\nGia Bảo\nMinh Khang";
            document.getElementById('studentsDataText').value = rawStd;
            
            // Chuyển text thành mảng đối tượng
            studentsMaster = rawStd.split('\n').filter(l => l.trim() !== '').map(line => {
                let p = line.split('|');
                return { name: p[0].trim(), img: p[1] ? p[1].trim() : `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(p[0].trim())}` };
            });

            const savedQ = localStorage.getItem('questionBankData');
            const rawQ = savedQ || "Câu 1: Thủ đô của Việt Nam là gì?\nA. Hà Nội\nB. TP. HCM\nC. Đà Nẵng\nD. Cần Thơ\nĐáp án: A";
            document.getElementById('questionsDataText').value = rawQ;
            questionBank = parseQuestions(rawQ);

            resetGame(); // Tạo các em học sinh bay lượn
        }

        function resetGame() {
            const gameArea = document.getElementById('game-area');
            gameArea.innerHTML = '';
            studentNodes = [];
            
            studentsMaster.forEach(std => {
                let el = document.createElement('div');
                el.className = 'student-node';
                el.innerHTML = `<img src="${std.img}"><div class="name">${std.name}</div>`;
                gameArea.appendChild(el);

                studentNodes.push({
                    element: el,
                    name: std.name,
                    x: Math.random() * (window.innerWidth - 100),
                    y: Math.random() * (window.innerHeight - 200),
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    wobble: Math.random() * 6,
                    selected: false
                });
            });
            updateStatusText();
        }

        function updateStatusText() {
            const remaining = studentNodes.filter(n => !n.isOut).length;
            const status = document.getElementById('statusText');
            if (remaining === 0) {
                status.innerText = "Đã gọi hết học sinh! Đang làm mới...";
                setTimeout(() => { resetGame(); }, 2000);
            } else {
                status.innerText = `Còn lại ${remaining} em chưa được gọi. Giơ tay để chọn!`;
            }
        }

        function animate() {
            if (isAnimating) {
                studentNodes.forEach(node => {
                    if (!node.selected && !node.isOut) {
                        node.x += node.vx; node.y += node.vy; node.wobble += 0.05;
                        if (node.x <= 0 || node.x >= window.innerWidth - 100) node.vx *= -1;
                        if (node.y <= 0 || node.y >= window.innerHeight - 200) node.vy *= -1;
                        node.element.style.transform = `translate(${node.x}px, ${node.y}px) rotate(${Math.sin(node.wobble)*8}deg)`;
                    }
                });
            }
            requestAnimationFrame(animate);
        }

        // --- LOGIC LOẠI DẦN HỌC SINH ---
        async function triggerSelection(count) {
            if (isSelecting) return;
            
            // Lọc ra các em chưa bị loại
            let availableNodes = studentNodes.filter(n => !n.isOut);
            if (availableNodes.length === 0) return;

            isSelecting = true;
            let actualCount = Math.min(count, availableNodes.length);
            
            // Xáo trộn và chọn
            let shuffled = [...availableNodes].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, actualCount);

            // Hiển thị chọn
            const startX = (window.innerWidth - (actualCount * 160)) / 2;
            selected.forEach((node, i) => {
                node.selected = true;
                node.element.classList.add('selected');
                node.element.style.transform = `translate(${startX + (i * 160)}px, ${window.innerHeight/2 - 100}px) scale(1.5)`;
            });

            document.getElementById('statusText').innerText = `🎉 Đã chọn: ${selected.map(n => n.name).join(', ')}`;

            // Đợi 5 giây rồi loại bỏ (biến mất)
            setTimeout(() => {
                selected.forEach(node => {
                    node.element.style.opacity = '0';
                    node.isOut = true; // Đánh dấu đã loại
                });
                
                setTimeout(() => {
                    selected.forEach(node => node.element.remove());
                    // Cập nhật lại danh sách studentNodes để loại hẳn các em đã Out
                    studentNodes = studentNodes.filter(n => !n.isOut);
                    
                    isSelecting = false;
                    updateStatusText();
                }, 500);
            }, 5000);
        }

        // --- CÁC HÀM TIỆN ÍCH KHÁC (GIỮ NGUYÊN TỪ BẢN TRƯỚC) ---
        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function saveSettings() {
            localStorage.setItem('classDataNamesOnly', document.getElementById('studentsDataText').value);
            localStorage.setItem('questionBankData', document.getElementById('questionsDataText').value);
            location.reload();
        }

        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            const b = document.getElementById('musicBtn');
            if (m.paused) { m.play(); b.innerText = '🔊'; } else { m.pause(); b.innerText = '🔇'; }
        }

        function parseQuestions(text) {
            let list = [];
            let blocks = text.split(/Câu \d+:/);
            blocks.forEach(b => {
                let lines = b.trim().split('\n');
                if (lines.length >= 5) {
                    let q = lines[0];
                    let opts = lines.slice(1, 5);
                    let ans = (b.match(/Đáp án: ([A-D])/) || [])[1] || "A";
                    list.push({ question: q, options: opts, answer: ans });
                }
            });
            return list;
        }

        function showRandomQuestion() {
            if (questionBank.length === 0) return alert("Chưa có câu hỏi!");
            let q = questionBank[Math.floor(Math.random() * questionBank.length)];
            currentCorrectAnswer = q.answer;
            document.getElementById('question-display').innerText = q.question;
            let html = '';
            ['A','B','C','D'].forEach((l, i) => {
                html += `<button class="option-btn" onclick="checkAnswer(this, '${l}')">${q.options[i]}</button>`;
            });
            document.getElementById('options-container').innerHTML = html;
            document.getElementById('questionModal').style.display = 'flex';
        }

        function checkAnswer(btn, choice) {
            if (choice === currentCorrectAnswer) {
                btn.classList.add('correct');
                document.getElementById('correctSound').play().catch(()=>{});
            } else {
                btn.classList.add('wrong');
                document.getElementById('wrongSound').play().catch(()=>{});
            }
        }

        // --- CAMERA AI ---
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
        
        let stableCount = 0; let lastFingers = 0;
        hands.onResults(results => {
            const canvasCtx = document.getElementById('output_canvas').getContext('2d');
            canvasCtx.clearRect(0, 0, 320, 240);
            canvasCtx.drawImage(results.image, 0, 0, 320, 240);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && !isSelecting) {
                let landmarks = results.multiHandLandmarks[0];
                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00'});
                
                // Đếm ngón tay đơn giản
                let f = 0;
                if (landmarks[8].y < landmarks[6].y) f++;
                if (landmarks[12].y < landmarks[10].y) f++;
                if (landmarks[16].y < landmarks[14].y) f++;
                if (landmarks[20].y < landmarks[18].y) f++;
                if (landmarks[4].x < landmarks[3].x) f++;

                document.getElementById('ai-status').innerText = `Đang thấy: ${f} ngón`;
                if (f > 0 && f === lastFingers) {
                    stableCount++;
                    if (stableCount > 25) { triggerSelection(f); stableCount = 0; }
                } else {
                    lastFingers = f; stableCount = 0;
                }
            }
        });

        const camera = new Camera(document.getElementById('webcam'), {
            onFrame: async () => { await hands.send({image: document.getElementById('webcam')}); },
            width: 320, height: 240
        });
        camera.start();

        window.onload = loadSettings;
        animate();
    </script>
</body>
</html>
